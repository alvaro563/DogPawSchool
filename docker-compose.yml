services:
  postgres:
    image: postgres:15-alpine
    container_name: dogpaw_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dogpaw_db
      POSTGRES_USER: dogpaw_user
      POSTGRES_PASSWORD: dogpaw_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dogpaw_pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "timezone=UTC"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dogpaw_user -d dogpaw_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  dogpaw_pgdata:
    name: dogpaw_pgdata
