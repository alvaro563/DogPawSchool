    get:
      description: |-
        Returns the denormalized ReservationView for every
        reservation whose dog is owned by the user in the
        path, ordered by created_at DESC. Supports
        optional filters: status, from, to.
      parameters:
      - description: Owner user ID
        in: path
        name: user_id
        required: true
        type: integer
      - description: Filter by status (CONFIRMED, COMPLETED, CANCELLED_IN_TIME, CANCELLED_LATE,
          FORGIVEN, NO_SHOW)
        in: query
        name: status
        type: string
      - description: Filter by created_at >= from (RFC3339)
        in: query
        name: from
        type: string
      - description: Filter by created_at <  to (RFC3339)
        in: query
        name: to
        type: string
      - description: Maximum number of reservations to return (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of reservations to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.listReservationsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: List a user's reservations
      tags:
      - reservations
    post:
      consumes:
      - application/json
      description: |-
        Books a dog into an activity, paid from one of the
        owner's passes. Atomically: validates the activity
        is in the future and not full, the dog is owned by
        the user in the path, and the pass is owned by the
        user and has at least one session. Consumes one pass
        session and creates the reservation in StatusConfirmed.
      parameters:
      - description: Owner user ID
        in: path
        name: user_id
        required: true
        type: integer
      - description: Reservation to create
        in: body
        name: reservation
        required: true
        schema:
          $ref: '#/definitions/handler.registerReservationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Reservation created
          schema:
            $ref: '#/definitions/handler.registerReservationResponse'
        "400":
          description: Invalid user_id, request body, or missing fields
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Activity full or duplicate reservation
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Book a reservation for a dog
      tags:
      - reservations
  /api/v1/users/{user_id}/reservations/{id}:
    get:
      description: |-
        Returns the denormalized ReservationView for the
        given reservation id, owned by the user in the
        path. Returns 404 if the id does not exist OR if
        the reservation belongs to a different user (no
        leak).
      parameters:
      - description: Owner user ID
        in: path
        name: user_id
        required: true
        type: integer
      - description: Reservation ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.reservationViewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Get a reservation by id
      tags:
      - reservations
  /api/v1/users/{user_id}/reservations/{id}/cancel:
    post:
      description: |-
        Cancels a CONFIRMED reservation owned by the user in
        the path. The activity must still be in the future
        and the reservation must be in StatusConfirmed. If
        the cancel happens more than 2h before the activity
        date, the reservation transitions to
        StatusCancelledInTime AND the pass session is
        refunded (remaining_sessions + 1, audit movement +1
        appended). If the cancel happens within the late
        window, the reservation transitions to
        StatusCancelledLate and no refund is applied (an
        admin can later call Forgive to refund it).
      parameters:
      - description: Owner user ID
        in: path
        name: user_id
        required: true
        type: integer
      - description: Reservation ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Reservation cancelled
          schema:
            $ref: '#/definitions/handler.cancelReservationResponse'
        "400":
          description: Invalid user_id or reservation_id
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Reservation not found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Already cancelled / not in a cancellable state
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Cancel a reservation
      tags:
      - reservations
  /api/v1/users/{user_id}/reservations/upcoming:
    get:
      description: |-
        Returns the views of every CONFIRMED reservation
        whose activity date is at or after the current
        time, ordered by activity date ASC.
      parameters:
      - description: Owner user ID
        in: path
        name: user_id
        required: true
        type: integer
      - description: Maximum number of reservations to return (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of reservations to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.listReservationsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: List a user's upcoming reservations
      tags:
      - reservations
swagger: "2.0"
