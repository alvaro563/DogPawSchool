definitions:
  handler.activityDTO:
    properties:
      activity_type:
        example: ROUTE
        type: string
      date:
        example: "2026-08-01T10:00:00Z"
        type: string
      duration_in_hours:
        example: 2
        type: integer
      id:
        example: 42
        type: integer
      location:
        example: Parking Central
        type: string
      max_capacity:
        example: 8
        type: integer
      name:
        example: Paseo Río
        type: string
    type: object
  handler.activityResponse:
    properties:
      activity_type:
        example: ROUTE
        type: string
      date:
        example: "2026-08-01T10:00:00Z"
        type: string
      duration_in_hours:
        example: 2
        type: integer
      id:
        example: 42
        type: integer
      location:
        example: Parking Central
        type: string
      max_capacity:
        example: 8
        type: integer
      name:
        example: Paseo Río
        type: string
    type: object
  handler.addIncompatibilityRequest:
    properties:
      incompatibility_id:
        example: 3
        type: integer
    required:
    - incompatibility_id
    type: object
  handler.addIncompatibilityResponse:
    properties:
      added:
        example: true
        type: boolean
      dog_id:
        example: 42
        type: integer
      incompatibilities:
        items:
          $ref: '#/definitions/handler.incompatibilityDTO'
        type: array
    type: object
  handler.cancelReservationResponse:
    properties:
      id:
        example: 99
        type: integer
      status:
        example: CANCELLED_IN_TIME
        type: string
    type: object
  handler.dogDTO:
    properties:
      age_in_months:
        example: 24
        type: integer
      breed:
        example: Labrador
        type: string
      educator_notes:
        example: ""
        type: string
      heat:
        example: false
        type: boolean
      id:
        example: 1
        type: integer
      incompatibilities:
        items:
          $ref: '#/definitions/handler.incompatibilityDTO'
        type: array
      is_active:
        example: true
        type: boolean
      medical_notes:
        example: ""
        type: string
      name:
        example: Luna
        type: string
      neutered:
        example: false
        type: boolean
      passport:
        example: ES-12345
        type: string
      photo_url:
        example: ""
        type: string
      sex:
        example: FEMALE
        type: string
      user_id:
        example: 1
        type: integer
      weight_kg:
        example: 22.5
        type: number
    type: object
  handler.errorResponse:
    properties:
      details:
        example: Field 'breed' is required
        type: string
      error:
        example: validation
        type: string
      field:
        example: breed
        type: string
    type: object
  handler.incompatibilityDTO:
    properties:
      id:
        example: 3
        type: integer
      level:
        example: ABSOLUTA
        type: string
      name:
        example: Reactivo a machos enteros
        type: string
    type: object
  handler.incompatibilityResponse:
    properties:
      id:
        example: 3
        type: integer
      level:
        example: BAJA
        type: string
      name:
        example: Miedo a petardos
        type: string
    type: object
  handler.listActivitiesResponse:
    properties:
      activities:
        items:
          $ref: '#/definitions/handler.activityDTO'
        type: array
      count:
        example: 1
        type: integer
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
    type: object
  handler.listDogsResponse:
    properties:
      count:
        example: 1
        type: integer
      dogs:
        items:
          $ref: '#/definitions/handler.dogDTO'
        type: array
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
    type: object
  handler.listIncompatibilitiesResponse:
    properties:
      count:
        example: 3
        type: integer
      incompatibilities:
        items:
          $ref: '#/definitions/handler.incompatibilityDTO'
        type: array
    type: object
  handler.listPassesResponse:
    properties:
      count:
        example: 3
        type: integer
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
      passes:
        items:
          $ref: '#/definitions/handler.passDTO'
        type: array
    type: object
  handler.listReservationsResponse:
    properties:
      count:
        type: integer
      limit:
        type: integer
      offset:
        type: integer
      reservations:
        items:
          $ref: '#/definitions/handler.reservationViewDTO'
        type: array
    type: object
  handler.modifyActivityRequest:
    properties:
      activity_type:
        example: SOCIALIZATION_GROUP
        type: string
      date:
        example: "2026-09-01T10:00:00Z"
        type: string
      duration_in_hours:
        example: 3
        type: integer
      location:
        example: Río
        type: string
      max_capacity:
        example: 12
        type: integer
      name:
        example: Paseo Largo
        type: string
    type: object
  handler.modifyDogRequest:
    properties:
      age_in_months:
        example: 24
        type: integer
      breed:
        example: Labrador
        type: string
      educator_notes:
        example: ""
        type: string
      heat:
        example: false
        type: boolean
      is_active:
        example: true
        type: boolean
      medical_notes:
        example: ""
        type: string
      name:
        example: Buddie
        type: string
      neutered:
        example: true
        type: boolean
      passport:
        example: ES-12345
        type: string
      photo_url:
        example: ""
        type: string
      sex:
        example: FEMALE
        type: string
      weight_kg:
        example: 22.5
        type: number
    type: object
  handler.modifyDogResponse:
    properties:
      id:
        example: 42
        type: integer
    type: object
  handler.modifyIncompatibilityRequest:
    properties:
      level:
        example: ABSOLUTA
        type: string
      name:
        example: Miedo a petardos y cohetes
        type: string
    type: object
  handler.modifyPassRequest:
    properties:
      expires_at:
        example: "2027-06-30T23:59:59Z"
        type: string
      pass_type:
        enum:
        - GENERICO
        - ESPECIFICO
        example: ESPECIFICO
        type: string
      price:
        example: 15000
        minimum: 0
        type: integer
    type: object
  handler.passDTO:
    properties:
      created_at:
        example: "2026-07-01T10:00:00Z"
        type: string
      expires_at:
        example: "2026-12-31T23:59:59Z"
        type: string
      id:
        example: 42
        type: integer
      num_of_sessions:
        example: 10
        type: integer
      pass_type:
        example: GENERICO
        type: string
      price:
        example: 12000
        type: integer
      remaining_sessions:
        example: 7
        type: integer
      updated_at:
        example: "2026-07-15T14:30:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  handler.passResponse:
    properties:
      created_at:
        example: "2026-07-01T10:00:00Z"
        type: string
      expires_at:
        example: "2026-12-31T23:59:59Z"
        type: string
      id:
        example: 42
        type: integer
      num_of_sessions:
        example: 10
        type: integer
      pass_type:
        example: GENERICO
        type: string
      price:
        example: 12000
        type: integer
      remaining_sessions:
        example: 7
        type: integer
      updated_at:
        example: "2026-07-15T14:30:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  handler.registerActivityRequest:
    properties:
      activity_type:
        enum:
        - SOCIALIZATION_GROUP
        - ROUTE
        - INDIVIDUAL_CLASS
        - EXTRA
        example: ROUTE
        type: string
      date:
        example: "2026-08-01T10:00:00Z"
        type: string
      duration_in_hours:
        example: 2
        type: integer
      location:
        example: Parking Central
        maxLength: 200
        minLength: 1
        type: string
      max_capacity:
        example: 8
        type: integer
      name:
        example: Paseo Río
        maxLength: 200
        minLength: 1
        type: string
    required:
    - activity_type
    - date
    - duration_in_hours
    - location
    - max_capacity
    - name
    type: object
  handler.registerActivityResponse:
    properties:
      id:
        example: 42
        type: integer
    type: object
  handler.registerDogRequest:
    properties:
      age_in_months:
        example: 24
        type: integer
      breed:
        example: Labrador
        maxLength: 120
        minLength: 1
        type: string
      name:
        example: Luna
        maxLength: 120
        minLength: 1
        type: string
      passport:
        example: ES-12345
        maxLength: 64
        minLength: 1
        type: string
      sex:
        enum:
        - MALE
        - FEMALE
        example: FEMALE
        type: string
      user_id:
        example: 1
        type: integer
      weight_kg:
        example: 22.5
        type: number
    required:
    - age_in_months
    - breed
    - name
    - passport
    - sex
    - user_id
    - weight_kg
    type: object
  handler.registerDogResponse:
    properties:
      id:
        example: 42
        type: integer
    type: object
  handler.registerIncompatibilityRequest:
    properties:
      level:
        enum:
        - ABSOLUTA
        - MEDIA
        - BAJA
        example: MEDIA
        type: string
      name:
        example: Reacciona mal al transportin
        maxLength: 120
        minLength: 1
        type: string
    required:
    - level
    - name
    type: object
  handler.registerIncompatibilityResponse:
    properties:
      id:
        example: 5
        type: integer
    type: object
  handler.registerPassRequest:
    properties:
      expires_at:
        example: "2026-12-31T23:59:59Z"
        type: string
      num_of_sessions:
        example: 10
        type: integer
      pass_type:
        enum:
        - GENERICO
        - ESPECIFICO
        example: GENERICO
        type: string
      price:
        example: 12000
        minimum: 0
        type: integer
    required:
    - num_of_sessions
    - pass_type
    type: object
  handler.registerPassResponse:
    properties:
      id:
        example: 42
        type: integer
    type: object
  handler.registerReservationRequest:
    properties:
      activity_id:
        example: 42
        type: integer
      dog_id:
        example: 7
        type: integer
      pass_id:
        example: 3
        type: integer
    required:
    - activity_id
    - dog_id
    - pass_id
    type: object
  handler.registerReservationResponse:
    properties:
      id:
        example: 99
        type: integer
    type: object
  handler.removeIncompatibilityResponse:
    properties:
      dog_id:
        example: 42
        type: integer
      incompatibilities:
        items:
          $ref: '#/definitions/handler.incompatibilityDTO'
        type: array
      removed:
        example: true
        type: boolean
    type: object
  handler.reservationViewDTO:
    properties:
      activity_date:
        example: "2026-08-01T10:00:00Z"
        type: string
      activity_id:
        example: 10
        type: integer
      activity_location:
        example: Parking Central
        type: string
      activity_name:
        example: Paseo Río
        type: string
      created_at:
        example: "2026-07-20T10:00:00Z"
        type: string
      dog_id:
        example: 5
        type: integer
      dog_name:
        example: Luna
        type: string
      id:
        example: 42
        type: integer
      pass_id:
        example: 3
        type: integer
      pass_remaining:
        example: 7
        type: integer
      pass_type:
        example: GENERICO
        type: string
      status:
        example: CONFIRMED
        type: string
    type: object
  handler.reservationViewResponse:
    properties:
      reservation:
        $ref: '#/definitions/handler.reservationViewDTO'
    type: object
  handler.setHeatRequest:
    properties:
      heat:
        example: false
        type: boolean
    type: object
  handler.setHeatResponse:
    properties:
      heat:
        example: false
        type: boolean
      id:
        example: 42
        type: integer
      sex:
        example: FEMALE
        type: string
    type: object
  handler.setNeuteredRequest:
    properties:
      neutered:
        example: true
        type: boolean
    type: object
  handler.setNeuteredResponse:
    properties:
      id:
        example: 42
        type: integer
      neutered:
        example: true
        type: boolean
      sex:
        example: FEMALE
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/activities:
    get:
      description: Returns a paginated list of all activities in the system, most
        recent first. Limit defaults to 50 and is capped at 100. Offset defaults to
        0.
      parameters:
      - description: Maximum number of activities to return (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of activities to skip for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of activities
          schema:
            $ref: '#/definitions/handler.listActivitiesResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: List all activities
      tags:
      - activities
    post:
      consumes:
      - application/json
      description: Creates a new school activity (class, route, individual session,
        or extra). Returns the new resource URL in the Location header.
      parameters:
      - description: Activity to create
        in: body
        name: activity
        required: true
        schema:
          $ref: '#/definitions/handler.registerActivityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Activity created
          schema:
            $ref: '#/definitions/handler.registerActivityResponse'
        "400":
          description: Invalid request body or missing fields
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Register a new activity
      tags:
      - activities
  /api/v1/activities/{id}:
    get:
      description: Returns a single activity by its id.
      parameters:
      - description: Activity ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Activity found
          schema:
            $ref: '#/definitions/handler.activityResponse'
        "400":
          description: Invalid id
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Activity not found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Get activity by ID
      tags:
      - activities
    patch:
      consumes:
      - application/json
      description: Partially updates an activity. Only the supplied fields are mutated;
        an empty body is a no-op.
      parameters:
      - description: Activity ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to patch
        in: body
        name: activity
        required: true
        schema:
          $ref: '#/definitions/handler.modifyActivityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated activity
          schema:
            $ref: '#/definitions/handler.activityResponse'
        "400":
          description: Invalid id, body, or validation error
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Activity not found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Patch an activity
      tags:
      - activities
  /api/v1/activities/{id}/reservations:
    get:
      description: |-
        Returns the views of every reservation for the
        given activity, ordered by created_at ASC. Class
        roster view.
      parameters:
      - description: Activity ID
        in: path
        name: id
        required: true
        type: integer
      - description: Maximum number of reservations to return (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of reservations to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.listReservationsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: List an activity's reservations
      tags:
      - reservations
  /api/v1/activities/upcoming:
    get:
      description: Returns a paginated list of activities scheduled at or after the
        current time, soonest first.
      parameters:
      - description: Maximum number of activities to return (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of activities to skip for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of upcoming activities
          schema:
            $ref: '#/definitions/handler.listActivitiesResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: List upcoming activities
      tags:
      - activities
  /api/v1/dogs:
    get:
      description: Returns a paginated list of all dogs across all owners. Limit defaults
        to 50 and is capped at 100. Offset defaults to 0.
      parameters:
      - description: Maximum number of dogs to return (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of dogs to skip for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of dogs with pagination metadata
          schema:
            $ref: '#/definitions/handler.listDogsResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: List all dogs in the system
      tags:
      - dogs
    post:
      consumes:
      - application/json
      description: Creates a new dog record owned by a user. The new resource URL
        is returned in the Location header.
      parameters:
      - description: Dog to register
        in: body
        name: dog
        required: true
        schema:
          $ref: '#/definitions/handler.registerDogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Dog created successfully
          schema:
            $ref: '#/definitions/handler.registerDogResponse'
        "400":
          description: Invalid request body, missing fields, validation error, or
            invalid user_id
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Passport already exists
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Register a new dog
      tags:
      - dogs
  /api/v1/dogs/{dog_id}/reservations:
    get:
      description: |-
        Returns the views of every reservation for the
        given dog, ordered by created_at DESC.
      parameters:
      - description: Dog ID
        in: path
        name: dog_id
        required: true
        type: integer
      - description: Maximum number of reservations to return (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of reservations to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.listReservationsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: List a dog's reservations
      tags:
      - reservations
  /api/v1/dogs/{id}:
    delete:
      description: Removes a dog by id. Associated dog_incompatibilities and reservations
        rows are deleted automatically by the database (ON DELETE CASCADE). Returns
        404 if the dog does not exist.
      parameters:
      - description: Dog ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Delete a dog
      tags:
      - dogs
    patch:
      consumes:
      - application/json
      description: Applies a partial update to an existing dog. Only the fields present
        in the request body are modified; omitted fields are preserved. An empty body
        is a no-op and returns 200 without touching the database. Designed for fixing
        typos (e.g. "Labarador" -> "Labrador") or correcting registration mistakes.
      parameters:
      - description: Dog ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to patch (only the fields you want to change)
        in: body
        name: dog
        required: true
        schema:
          $ref: '#/definitions/handler.modifyDogRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Dog patched (or no-op if body was empty)
          schema:
            $ref: '#/definitions/handler.modifyDogResponse'
        "400":
          description: Invalid id, invalid request body, or validation error (e.g.
            empty name, negative weight, invalid sex)
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Dog not found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Passport already exists
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Patch a dog (partial update)
      tags:
      - dogs
  /api/v1/dogs/{id}/heat:
    patch:
      consumes:
      - application/json
      description: 'Fast-path endpoint to flip the heat flag. Body is {"heat": true|false}.
        Returns 400 with error "invalid_heat_for_sex" if heat=true is attempted on
        a non-female dog.'
      parameters:
      - description: Dog ID
        in: path
        name: id
        required: true
        type: integer
      - description: New value for heat
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.setHeatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.setHeatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Set the heat flag of a dog
      tags:
      - dogs
  /api/v1/dogs/{id}/incompatibilities:
    post:
      consumes:
      - application/json
      description: 'Idempotently attaches an existing incompatibility (looked up by
        id) to a dog. If the dog already has that incompatibility, returns 200 with
        `added: false` and the current list (no DB write). Otherwise persists the
        change and returns 201 with `added: true` and the updated list. Both the dog
        and the incompatibility must exist.'
      parameters:
      - description: Dog ID
        in: path
        name: id
        required: true
        type: integer
      - description: Incompatibility to attach
        in: body
